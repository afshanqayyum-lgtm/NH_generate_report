<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NH Report Generator</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"DM Sans",sans-serif;background:#faf5ff;min-height:100vh;display:flex;flex-direction:column}.header{background:#8000ff;padding:24px 40px;display:flex;align-items:center;justify-content:space-between}.header h1{color:white;font-size:20px;font-weight:600;letter-spacing:-0.3px}.header .sub{color:rgba(255,255,255,0.7);font-size:13px;margin-top:3px}.header .logo{color:white;font-size:20px;font-weight:700;letter-spacing:-1px}.main{flex:1;padding:32px 40px;max-width:900px;margin:0 auto;width:100%}.card{background:white;border-radius:12px;border:1px solid #e8e0f5;padding:24px;margin-bottom:20px}.sec-lbl{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#8000ff;margin-bottom:14px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}.field-lbl{font-size:12px;color:#4a4a6a;display:block;margin-bottom:5px;font-weight:500}select{width:100%;padding:8px 10px;border:1px solid #ddd4f5;border-radius:6px;font-size:13px;font-family:"DM Sans",sans-serif;color:#1a1a2e;background:white}.mw{position:relative}.mb{width:100%;text-align:left;padding:8px 10px;border:1px solid #ddd4f5;border-radius:6px;font-size:13px;font-family:"DM Sans",sans-serif;background:white;color:#4a4a6a;cursor:pointer;display:flex;justify-content:space-between;align-items:center}.mb.on{border-color:#8000ff;color:#5900b3}.mb:disabled{opacity:0.5;cursor:not-allowed}.mdd{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1px solid #ddd4f5;border-radius:8px;z-index:100;box-shadow:0 4px 16px rgba(128,0,255,0.1);max-height:240px;flex-direction:column}.mdd.open{display:flex}.dda{padding:6px 10px;border-bottom:1px solid #f0e6ff;display:flex;gap:6px;flex-shrink:0}.dda button{font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;border:1px solid #ddd4f5;background:#f8f4ff;color:#5900b3}.dds{padding:6px 10px;border-bottom:1px solid #f0e6ff;flex-shrink:0}.dds input{width:100%;padding:5px 8px;border:1px solid #e8e0f5;border-radius:4px;font-size:12px}.ddl{overflow-y:auto;flex:1}.di{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:13px;color:#1a1a2e}.di:hover{background:#f8f4ff}.chk{width:14px;height:14px;border-radius:3px;border:1px solid #c299ff;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px}.di.sel .chk{background:#8000ff;border-color:#8000ff;color:white}.loading{text-align:center;padding:40px;color:#8000ff;font-size:13px}.bottom{display:flex;align-items:center;gap:10px;padding-top:4px}.sum{font-size:12px;color:#888;flex:1}.btn-clear{font-size:12px;padding:8px 16px;border-radius:6px;cursor:pointer;border:1px solid #ddd4f5;background:white;color:#4a4a6a}.btn-go{background:#8000ff;color:white;border:none;padding:10px 26px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}.btn-go:disabled{background:#c299ff;cursor:not-allowed}.spin{display:none;text-align:center;padding:16px;color:#8000ff;font-size:13px}.res{margin-top:14px;padding:14px 18px;border-radius:8px;font-size:13px;display:none}.res.ok{background:#e6f4ea;border:1px solid #a8d5b5;color:#1a6e35}.res.err{background:#fce8e6;border:1px solid #f5b7b1;color:#a01010}.footer{background:white;border-top:1px solid #e8e0f5;padding:14px 40px;text-align:center;color:#bbb;font-size:11px}</style></head><body><div class="header"><div><h1>NH Performance Report Generator</h1><div class="sub">Select criteria and generate your report</div></div><div class="logo">zoopla</div></div><div class="main" id="mainArea"><div class="loading">Loading filter options…</div></div><div class="footer">NH Performance Report Generator · Zoopla AdOps</div><script>const SCRIPT_URL="https://script.google.com/a/macros/zoopla.co.uk/s/AKfycbx0XLmNRkKbzRHxJs9zyPZknwalwQlA7Frh-Z9berCTIBWqzADQ7Lmi51U8_bRDvVqnYQ/exec";let DEP={};let ALL_PRODUCTS=[];const state={parent:{},account:{},dev:{},cin:{},product:{}};const opts={parent:[],account:[],dev:[],cin:[],product:[]};const ddOpen={};function init(){  fetch(SCRIPT_URL+"?action=getFilterOptions")  .then(r=>r.json())  .then(data=>{    DEP=data.dependent;ALL_PRODUCTS=data.allProducts;    opts.parent=data.parents;    opts.parent.forEach(v=>state.parent[v]=false);    ALL_PRODUCTS.forEach(v=>state.product[v]=false);    opts.product=ALL_PRODUCTS;    buildUI();  }).catch(e=>{document.getElementById("mainArea").innerHTML="<div class='loading' style='color:red'>Error loading options: "+e.message+"</div>";});}function buildUI(){  document.getElementById("mainArea").innerHTML=    '<div class="card"><div class="sec-lbl">Date range</div><div class="row2">'    +'<div><label class="field-lbl">From</label><select id="fromMonth"></select></div>'    +'<div><label class="field-lbl">To</label><select id="toMonth"></select></div>'    +'</div></div>'    +'<div class="card"><div class="sec-lbl">Filters</div><div class="row4">'    +'<div><label class="field-lbl">Parent group</label>'+mwHtml("parent")+'</div>'    +'<div><label class="field-lbl">Account</label>'+mwHtml("account")+'</div>'    +'<div><label class="field-lbl">Development</label>'+mwHtml("dev")+'</div>'    +'<div><label class="field-lbl">CIN</label>'+mwHtml("cin")+'</div>'    +'</div></div>'    +'<div class="card"><div class="sec-lbl">Products</div>'+mwHtml("product")+'</div>'    +'<div class="bottom"><span class="sum" id="sumText">All criteria</span>'    +'<button class="btn-clear" onclick="clearAll()">Clear all</button>'    +'<button class="btn-go" id="btnGo" onclick="generate()">Generate report</button></div>'    +'<div class="spin" id="spin">Generating… this may take 20–30 seconds.</div>'    +'<div class="res" id="res"></div>';  buildMonths();  renderList("parent", opts.parent);  renderList("product", opts.product);  ["account","dev","cin"].forEach(id=>{ opts[id]=[]; renderList(id,[]); setDisabled(id,true); });  bindClose();  updateSum();}function mwHtml(id){  return '<div class="mw" id="wrap-'+id+'">'    +'<button class="mb" id="btn-'+id+'" onclick="toggleDd(\'"+id+"\')">'    +'<span id="lbl-'+id+'">All</span><span>&#8964;</span></button>'    +'<div class="mdd" id="dd-'+id+'">'    +'<div class="dda"><button onclick="selAll(\'"+id+"\')" >All</button><button onclick="selNone(\'"+id+"\')" >None</button></div>'    +(id!=="product"?'<div class="dds"><input type="text" placeholder="Search..." oninput="search(\'"+id+"\',this.value)"></div>':"")    +'<div class="ddl" id="list-'+id+'"></div></div></div>';}function buildMonths(){  const now=new Date();  ["fromMonth","toMonth"].forEach((id,i)=>{    const sel=document.getElementById(id);    for(let m=17;m>=0;m--){      const d=new Date(now.getFullYear(),now.getMonth()-m,1);      const val=String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();      const lbl=d.toLocaleString("default",{month:"short",year:"numeric"});      const o=document.createElement("option");      o.value=val;o.textContent=lbl;      if(i===0&&m===3)o.selected=true;      if(i===1&&m===0)o.selected=true;      sel.appendChild(o);    }  });}function setDisabled(id,dis){  const btn=document.getElementById("btn-"+id);  if(btn){btn.disabled=dis;}}function onParentChange(){  const selParents=getSelected("parent");  const parents=selParents.length?selParents:Object.keys(DEP);  const acc=new Set(),dev=new Set(),cin=new Set(),prod=new Set();  parents.forEach(p=>{    if(!DEP[p])return;    DEP[p].accounts.forEach(v=>acc.add(v));    DEP[p].developments.forEach(v=>dev.add(v));    DEP[p].cins.forEach(v=>cin.add(v));    DEP[p].products.forEach(v=>prod.add(v));  });  opts.account=[...acc].sort();opts.dev=[...dev].sort();opts.cin=[...cin].sort();  opts.product=[...prod].sort();  ["account","dev","cin","product"].forEach(id=>{    const prev=Object.keys(state[id]).filter(v=>state[id][v]);    state[id]={};    opts[id].forEach(v=>state[id][v]=prev.includes(v));    renderList(id,opts[id]);    setDisabled(id,false);    updateBtn(id);  });  updateSum();}function renderList(id,items){  const list=document.getElementById("list-"+id);if(!list)return;list.innerHTML="";  if(!items.length){list.innerHTML='<div style="padding:10px 12px;font-size:12px;color:#aaa;">No options available</div>';return;}  items.forEach(v=>{    const row=document.createElement("div");    row.className="di"+(state[id][v]?" sel":"");row.dataset.val=v;    row.innerHTML='<div class="chk">'+(state[id][v]?"&#10003;":"")+"</div><span>"+v+"</span>";    row.onclick=()=>toggle(id,v,row);list.appendChild(row);  });}function toggle(id,v,row){  state[id][v]=!state[id][v];  row.classList.toggle("sel",state[id][v]);  row.querySelector(".chk").innerHTML=state[id][v]?"&#10003;":"";  updateBtn(id);updateSum();  if(id==="parent")onParentChange();}function toggleDd(id){  const btn=document.getElementById("btn-"+id);if(btn&&btn.disabled)return;  Object.keys(ddOpen).forEach(k=>{if(k!==id&&ddOpen[k]){ddOpen[k]=false;const d=document.getElementById("dd-"+k);if(d)d.classList.remove("open");}});  ddOpen[id]=!ddOpen[id];const dd=document.getElementById("dd-"+id);if(dd)dd.classList.toggle("open",ddOpen[id]);}function bindClose(){  document.addEventListener("click",e=>{    ["parent","account","dev","cin","product"].forEach(id=>{      const w=document.getElementById("wrap-"+id);      if(w&&ddOpen[id]&&!w.contains(e.target)){ddOpen[id]=false;const d=document.getElementById("dd-"+id);if(d)d.classList.remove("open");}    });  });}function search(id,q){  renderList(id,opts[id].filter(v=>v.toLowerCase().includes(q.toLowerCase())));}function selAll(id){opts[id].forEach(v=>state[id][v]=true);renderList(id,opts[id]);updateBtn(id);updateSum();if(id==="parent")onParentChange();}function selNone(id){opts[id].forEach(v=>state[id][v]=false);renderList(id,opts[id]);updateBtn(id);updateSum();if(id==="parent")onParentChange();}function clearAll(){["parent","account","dev","cin","product"].forEach(id=>selNone(id));}function getSelected(id){return opts[id].filter(v=>state[id][v]);}function updateBtn(id){  const sel=getSelected(id),total=opts[id].length,lbl=document.getElementById("lbl-"+id),btn=document.getElementById("btn-"+id);  if(!lbl||!btn)return;  if(!sel.length){lbl.textContent=id==="product"?"All products":"All";btn.classList.remove("on");}  else if(sel.length===1){lbl.textContent=sel[0];btn.classList.add("on");}  else if(sel.length===total){lbl.textContent="All ("+total+")";btn.classList.remove("on");}  else{lbl.textContent=sel.length+" selected";btn.classList.add("on");}}function updateSum(){  const labels={parent:"group",account:"account",dev:"development",cin:"CIN",product:"product"};  const parts=["parent","account","dev","cin","product"].reduce((a,id)=>{const c=getSelected(id).length;if(c)a.push(c+" "+labels[id]+(c>1?"s":""));return a;},[]);  const el=document.getElementById("sumText");if(!el)return;  const from=document.getElementById("fromMonth")?.value||"",to=document.getElementById("toMonth")?.value||"";  const ds=from&&to?from+(from!==to?" – "+to:""):"";  el.textContent=(ds?ds+" · ":"")+(parts.length?parts.join(" · "):"All criteria");}function generate(){  const params={fromMonth:document.getElementById("fromMonth").value,toMonth:document.getElementById("toMonth").value,    parents:getSelected("parent"),accounts:getSelected("account"),developments:getSelected("dev"),cins:getSelected("cin"),products:getSelected("product")};  document.getElementById("spin").style.display="block";  document.getElementById("res").style.display="none";  document.getElementById("btnGo").disabled=true;  fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"generateReport",params:params})})  .then(r=>r.json()).then(data=>{    document.getElementById("spin").style.display="none";    document.getElementById("btnGo").disabled=false;    const r=document.getElementById("res");    if(data.url){r.className="res ok";r.innerHTML="✓ Report ready! <a href='"+data.url+"' target='_blank' style='color:#1a6e35;font-weight:600;'>Open "+data.filename+"</a>";}    else{r.className="res err";r.textContent="Error: "+(data.error||"Unknown error");}    r.style.display="block";  }).catch(e=>{document.getElementById("spin").style.display="none";document.getElementById("btnGo").disabled=false;const r=document.getElementById("res");r.className="res err";r.textContent="Request failed: "+e.message;r.style.display="block";});}init();</script></body></html>
